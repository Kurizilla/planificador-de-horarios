server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # index.html sin cache para que tras un deploy el navegador pida la nueva versión (y los nuevos assets con hash).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
